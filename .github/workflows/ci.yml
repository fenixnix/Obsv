name: CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PROJECT_NAME: Obsv
  SOLUTION_FILE: Obsv.Avalonia.slnx
  MAIN_PROJECT: src/Obsv.Avalonia/Obsv.Avalonia.csproj

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}
      
    - name: Build
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore
      
    - name: Test
      run: dotnet test ${{ env.SOLUTION_FILE }} --no-build --verbosity normal
      
    - name: Publish Windows x64
      run: |
        dotnet publish ${{ env.MAIN_PROJECT }} `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o publish/win-x64
          
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Obsv-Windows-x64
        path: publish/win-x64/**
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxcb-present0 libxcb-randr0 libxcb-xfixes0 libxcb-shape0 libxcb-shm0 libxext6 libxrender1 libxtst6 libxi6 libasound2t64
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}
      
    - name: Build
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore
      
    - name: Test
      run: dotnet test ${{ env.SOLUTION_FILE }} --no-build --verbosity normal
      
    - name: Publish Linux x64
      run: |
        dotnet publish ${{ env.MAIN_PROJECT }} \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -o publish/linux-x64
          
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: Obsv-Linux-x64
        path: publish/linux-x64/**
        if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'
        
    - name: Setup .NET Workloads
      run: |
        dotnet workload install android
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_FILE }}
      
    - name: Build
      run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore
      
    - name: Publish Android APK
      run: |
        dotnet publish ${{ env.MAIN_PROJECT }} \
          -c Release \
          -r android-arm64 \
          --self-contained true \
          --platform android \
          -p:AndroidPackageFormat=apk \
          -p:AndroidUseAapt2=true \
          -p:CreatePackage=true \
          -p:ApplicationId=com.fenixnix.obsv \
          -p:ApplicationVersion=1.0.0 \
          -p:ApplicationVersionCode=1 \
          -o publish/android-apk
          
    - name: Find APK files
      run: |
        echo "Looking for APK files..."
        find publish/android-apk -name "*.apk" -type f || true
        
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: Obsv-Android-APK
        path: |
          publish/android-apk/**/*.apk
          publish/android-apk/**/*Signed.apk
          publish/android-apk/**/*.apk
        if-no-files-found: error

  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: Obsv-Windows-x64
        path: artifacts/win-x64
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: Obsv-Linux-x64
        path: artifacts/linux-x64
        
    - name: Download Android artifact
      uses: actions/download-artifact@v4
      with:
        name: Obsv-Android-APK
        path: artifacts/android
        
    - name: Create Windows zip
      run: |
        cd artifacts/win-x64
        zip -r ../../Obsv-Windows-x64.zip .
        
    - name: Create Linux tar.gz
      run: |
        cd artifacts/linux-x64
        tar -czvf ../../Obsv-Linux-x64.tar.gz .
        
    - name: Create Release APK
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Obsv-Windows-x64.zip
          Obsv-Linux-x64.tar.gz
          artifacts/android/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
